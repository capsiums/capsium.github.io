name: links

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  link_checker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: npm run build

    # Offline check: internal links (including root-relative ones like /features)
    # are resolved against dist/ and verified; external URLs are skipped so the
    # check never flakes on network or rate limits. The two --exclude patterns are
    # known-dead relative links inside generated API docs we cannot fix at the
    # source: TypeDoc rewrote a `[schemas/](schemas)` directory link from the
    # @capsium/core README into media/schemas without copying the directory, and
    # RDoc misparsed an AsciiDoc URL macro in the capsium gem README into a
    # relative mn-samples-iso-Linux link.
    - name: Link Checker
      uses: lycheeverse/lychee-action@v2
      with:
        args: --offline --no-progress --root-dir "${{ github.workspace }}/dist" --exclude 'docs/api/(js/media/schemas|ruby/mn-samples-iso-Linux)' 'dist/**/*.html'
        fail: true
