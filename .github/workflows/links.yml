name: links

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  link_checker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Build site
      run: npm run build

    # Offline check: internal links (including root-relative ones like /features)
    # are resolved against dist/ and verified; external URLs are skipped so the
    # check never flakes on network or rate limits.
    - name: Link Checker
      uses: lycheeverse/lychee-action@v2
      with:
        args: --offline --no-progress --root-dir "${{ github.workspace }}/dist" 'dist/**/*.html'
        fail: true
